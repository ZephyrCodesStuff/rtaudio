name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"

permissions:
  contents: write # Required for GitHub Actions to create the release

jobs:
  build:
    name: Build rtaudio
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release
        run: |
          xcodebuild \
            -scheme rtaudio \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            -arch x86_64 \
            MACOSX_DEPLOYMENT_TARGET=15.5 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            build

      - name: Archive app
        run: |
          ditto build/Build/Products/Release/rtaudio.app rtaudio.app

      - name: Ad-hoc sign app for Sparkle validation
        run: |
          codesign --force --deep --sign - rtaudio.app
          codesign --verify --deep --strict rtaudio.app

      - name: Create DMG
        run: |
          mkdir dmg_temp
          cp -r rtaudio.app dmg_temp/
          hdiutil create -volname rtaudio -srcfolder dmg_temp -ov -format UDZO rtaudio.dmg
          rm -rf dmg_temp

      - name: Download and extract Sparkle
        run: |
          cd /tmp
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz | tar xJ

      - name: Generate Sparkle appcast
        run: |
          mkdir -p sparkle_updates
          cp ./rtaudio.dmg ./sparkle_updates/
          printf '%s' "${{ secrets.SPARKLE_PRIVATE_KEY }}" | /tmp/bin/generate_appcast \
            --ed-key-file - \
            -o appcast.xml \
            ./sparkle_updates

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtaudio-release
          path: |
            rtaudio.dmg
            appcast.xml
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch git history for the commit message

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get latest commit message
        id: commit_msg
        run: |
          # Grabs the last commit message and handles multi-line outputs safely
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "msg<<$EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          # expose short SHA for use in the release name/tag
          echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Push appcast to rtaudio-updater repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/rtaudio-updater.git updater
          cp artifacts/appcast.xml updater/appcast.xml
          cd updater
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add appcast.xml
          git commit -m "Update appcast for release-${{ steps.commit_msg.outputs.short_sha }}" || true
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # create a release/tag that points at the pushed commit (no pre-existing tag required)
          tag_name: release-${{ steps.commit_msg.outputs.short_sha }}
          target_commitish: ${{ github.sha }}
          name: "🔖 Release #${{ steps.commit_msg.outputs.short_sha }}"
          body: ${{ steps.commit_msg.outputs.msg }}
          files: |
            artifacts/rtaudio.dmg
            artifacts/appcast.xml
